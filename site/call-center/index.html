<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANTROVA STUDIO — Колл-центр</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body data-page="callcenter">
  <header class="header"><div class="container header-inner"><div class="brand"><div class="brand-badge">MS</div><div><div class="brand-title">MANTROVA STUDIO</div><div class="brand-sub">Колл-центр</div></div></div></div></header>
  <main class="container">
    <div class="cc-layout">
      <aside class="panel sidebar">
        <div style="font-size:22px;font-weight:900">Заказы</div>
        <div class="muted" style="margin-top:8px">Поиск, статусы, заметки</div>
        <label class="field" style="margin-top:16px"><span class="label">Поиск</span><input class="input" id="orderSearch" placeholder="Номер, имя, телефон, адрес"></label>
      </aside>
      <section>
        <article class="panel contact-card">
          <div class="section-title"><h2>Все заказы</h2><p>Новый • ожидает оплаты • на производстве • в доставке • выполнен</p></div>
          <div class="table-wrap"><table><thead><tr><th>Заказ</th><th>Клиент</th><th>Адрес</th><th>Сумма</th><th>Статус</th><th>Заметка</th><th></th></tr></thead><tbody id="ordersTable"></tbody></table></div>
        </article>
      </section>
    </div>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
